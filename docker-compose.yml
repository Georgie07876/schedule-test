version: "3.9"

services:
  backend:
    build: backend
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
  postgres:
    image: postgres:16
    container_name: schedule_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: schedule_db
      POSTGRES_USER: schedule_user
      POSTGRES_PASSWORD: schedule123
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: schedule_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
